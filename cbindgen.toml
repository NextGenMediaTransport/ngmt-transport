# cbindgen config for ngmt-transport C ABI (Phase 3).
# Run: cargo build (build.rs regenerates include/ngmt_transport.h)

language = "C"
# Wrap exported functions in `extern "C"` for C++ consumers (CMake, ngmt-core smoke tool).
cpp_compat = true
pragma_once = true
include_guard = "NGMT_TRANSPORT_H"
sys_includes = ["stdint.h", "stdbool.h", "stddef.h"]
documentation = true
documentation_style = "doxy"

[export]
# Export C ABI types and #[no_mangle] functions from `ffi`
include = [
  "NgmtObjectHeader",
  "NgmtByteSlice",
  "NgmtTransportConfig",
  "NgmtDiscoveredService",
  "WlanOptimization",
  "ngmt_transport_abi_version",
  "ngmt_object_header_write_le",
  "ngmt_object_header_read_le",
  "ngmt_transport_init",
  "ngmt_transport_shutdown",
  "ngmt_transport_discover_refresh",
  "ngmt_transport_discover_count",
  "ngmt_transport_discover_get",
  "ngmt_transport_discover_lookup",
  "ngmt_transport_set_log_fn",
  "ngmt_transport_try_init_tracing_forwarder",
]

[fn]
rename_args = "None"
